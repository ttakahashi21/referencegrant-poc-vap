apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: restored-pvc-ok
  namespace: namespace2
spec:
  storageClassName: standard
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  dataSourceRef:
    apiGroup: snapshot.storage.k8s.io
    kind: VolumeSnapshot
    name: source-snapshot-a # Name included in the allowlist
    namespace: namespace1
