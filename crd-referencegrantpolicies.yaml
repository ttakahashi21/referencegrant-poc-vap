apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: referencegrantpolicies.policy.example.com
spec:
  group: policy.example.com
  scope: Namespaced
  names:
    kind: ReferenceGrantPolicy
    plural: referencegrantpolicies
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              from:
                # Definition of the source (Consumer)
                type: array
                items:
                  type: object
                  properties:
                    group: { type: string }
                    kind: { type: string }
                    namespace: { type: string }
              to:
                # Definition of the target (Destination)
                type: array
                items:
                  type: object
                  properties:
                    group: { type: string }
                    kind: { type: string }
                    names:
                      # If empty, all resources are allowed
                      type: array
                      items:
                        type: object
                        properties:
                          name: { type: string }
